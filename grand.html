<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>The Grand Mandarin</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23031C12'/></svg>">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
    }
    .wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    img {
      max-width: 100vw;
      max-height: 100vh;
      width: auto;
      height: auto;
      display: block;
    }
    .back {
      position: fixed;
      top: 14px;
      left: 14px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(3,28,18,0.85);
      color: white;
      text-decoration: none;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-size: 14px;
      line-height: 1;
    }
  </style>
</head>
<body>
 <div class="wrap">
  <a href="https://www.instagram.com/mandarincruiseline?igsh=MXg3ZW5waHRuandhNQ==" target="_blank">

  </a>
</div>

</html>
