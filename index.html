<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mandarin Cruiseline — Coming Soon</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  overflow-x: hidden; /* امنع سكرول عرض */
  overflow-y: auto;   /* سكرول طول */
}

.wrapper{
  position: relative;
  width: 100%;
}

/* خلي الصورة تتمدد بعرض الشاشة وتاخد ارتفاعها الطبيعي */
.page{
  display:block;
  width:100%;
  height:auto;
}

/* hotspots تبقى فوق الصورة */
.hotspot{
  position:absolute;
  cursor:pointer;
  display:block;
}
</style>
</head>

<body>

<div class="wrapper" id="wrap">
  <img src="page1.png" class="page" id="page" alt="page">
  <a id="royalBtn" class="hotspot" href="royal.html" aria-label="Royal"></a>
  <a id="grandBtn" class="hotspot" href="grand.html" aria-label="Grand"></a>
</div>

<script>
(function () {
  const img = document.getElementById('page');
  const wrap = document.getElementById('wrap');
  const royal = document.getElementById('royalBtn');
  const grand = document.getElementById('grandBtn');

  /* تكبير مساحة الضغط حوالين الزر */
  const padding = 0.03; // 3% زيادة من كل اتجاه

  const frac = {
    royal: { x: 0.062, y: 0.842, w: 0.205, h: 0.095 },
    grand: { x: 0.715, y: 0.842, w: 0.205, h: 0.095 }
  };

  function place(el, f) {
    const r = img.getBoundingClientRect();
    const w = r.width;
    const h = r.height;

    el.style.left   = (w * (f.x - padding)) + 'px';
    el.style.top    = (h * (f.y - padding)) + 'px';
    el.style.width  = (w * (f.w + padding*2)) + 'px';
    el.style.height = (h * (f.h + padding*2)) + 'px';
  }

  function layout() {
    // مهم: نخلي wrapper نفس مقاس الصورة عشان absolute يظبط
    wrap.style.width = img.clientWidth + 'px';
    place(royal, frac.royal);
    place(grand, frac.grand);
  }

  if (img.complete) layout();
  else img.addEventListener('load', layout);

  window.addEventListener('resize', layout);
})();
</script>

</body>
</html>
