
<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mandarin Cruiseline — Coming Soon</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%;
  overflow-x: hidden;
  overflow-y: auto;   
}

.page {
  position:fixed;
  inset:0;
  width:100vw;
  height:100vh;
  object-fit:cover;
}

.hotspot {
  position:fixed;
  cursor:pointer;
}
</style>

</head>

<body>

<img src="page1.png" class="page" id="page">

<a id="royalBtn" class="hotspot" href="royal.html"></a> <a id="grandBtn" class="hotspot" href="grand.html"></a>

<script>
(function () {
  const img = document.getElementById('page');
  const royal = document.getElementById('royalBtn');
  const grand = document.getElementById('grandBtn');

  /* تكبير مساحة الضغط حوالين الزر */
  const padding = 0.03; // 3% زيادة من كل اتجاه

  const frac = {
    royal: { x: 0.062, y: 0.842, w: 0.205, h: 0.095 },
    grand: { x: 0.715, y: 0.842, w: 0.205, h: 0.095 }
  };

  function place(el, f) {
    const r = img.getBoundingClientRect();

    el.style.left   = (r.left + r.width  * (f.x - padding)) + 'px';
    el.style.top    = (r.top  + r.height * (f.y - padding)) + 'px';
    el.style.width  = (r.width  * (f.w + padding*2)) + 'px';
    el.style.height = (r.height * (f.h + padding*2)) + 'px';
  }

  function layout() {
    place(royal, frac.royal);
    place(grand, frac.grand);
  }

  if (img.complete) layout();
  else img.addEventListener('load', layout);

  window.addEventListener('resize', layout);
})();
</script>

</body>
</html>
