<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RM — Coming Soon</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23031C12'/></svg>">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
}

/* الصورة تملأ الشاشة بالكامل */
.page {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  object-fit: cover;
}

/* أزرار اللينكات */
.hotspot {
  position: fixed;
  border-radius: 999px;
  cursor: pointer;
}
</style>

</head>

<body>

<img src="page1.png" class="page" id="page" alt="Coming Soon">

<!-- EXPERIENCE ROYAL -->

<a class="hotspot"
id="royalBtn"
href="royal.html"
target="_blank"
rel="noopener"> </a>

<!-- EXPLORE GRAND -->

<a class="hotspot"
id="grandBtn"
href="grand.html"
target="_blank"
rel="noopener"> </a>

<script>
(function () {
  const img = document.getElementById('page');
  const royal = document.getElementById('royalBtn');
  const grand = document.getElementById('grandBtn');

  /* الإحداثيات مظبوطة على 1920×1080 */
  const frac = {
    royal: { x: 0.062, y: 0.842, w: 0.205, h: 0.095 },
    grand: { x: 0.715, y: 0.842, w: 0.205, h: 0.095 }
  };

  function place(el, f) {
    const r = img.getBoundingClientRect();
    el.style.left   = (r.left + r.width  * f.x) + 'px';
    el.style.top    = (r.top  + r.height * f.y) + 'px';
    el.style.width  = (r.width  * f.w) + 'px';
    el.style.height = (r.height * f.h) + 'px';
  }

  function layout() {
    place(royal, frac.royal);
    place(grand, frac.grand);
  }

  if (img.complete) layout();
  else img.addEventListener('load', layout);

  window.addEventListener('resize', layout);
})();
</script>

</body>
</html>
